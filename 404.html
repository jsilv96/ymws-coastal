<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5efe4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0d1f26" media="(prefers-color-scheme: dark)" />
  <meta name="format-detection" content="telephone=no, address=no, email=no" />
  <meta name="robots" content="noindex, follow" />

  <title>Page Not Found — Oliva &amp; Mare</title>
  <meta name="description" content="The page you're looking for has wandered off — let us guide you back to the table." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Italiana&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px;
      color: var(--color-bg);
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(13,31,38,.85), rgba(13,31,38,.95)),
        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=2000&q=85') center/cover no-repeat;
      z-index: 0;
    }
    .error-content { position: relative; z-index: 1; max-width: 640px; }
    .error-code {
      font-family: var(--display);
      font-size: clamp(120px, 22vw, 240px);
      line-height: 1;
      letter-spacing: 4px;
      color: var(--color-primary);
      margin-bottom: 20px;
    }
    .error-title {
      font-family: var(--display);
      font-size: clamp(36px, 5vw, 56px);
      color: var(--color-bg);
      margin-bottom: 18px;
      font-weight: 400;
    }
    .error-title .italic {
      color: inherit;
      font-style: normal;
    }
    .error-message {
      color: rgba(245,239,228,.8);
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="error-page" role="main">
    <div class="error-content">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">A wrong <span class="italic">turn at sea.</span></h1>
      <p class="error-message">The page you were searching for has drifted off course. Let us guide you back to the table.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Return Home</a>
        <a href="about.html" class="btn btn-ghost">Visit Our Story</a>
      </div>
    </div>
  </main>
</body>
</html>
